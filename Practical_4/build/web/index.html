<html>
    <head>
        <title>User Login</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
       
    </head>
    
    <body style='display: flex;
                flex: 1;
                height: 100vh;
                margin: 0px;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                font-family: Arial, sans-serif;'>
        
        <div style='border-width: 1px;
                border-style: solid;
                border-color: black;
                padding: 35px;
                border-radius:45px'>
            <h2 style='font-size: 50px'>User Login</h2>

            <form action="LoginServlet" method="post">
                Username<br>
                <input style='padding: 12px; border-radius: 10px' type="text" name="username"><br><br>
                Password<br>
                <input style='padding: 12px; border-radius: 10px' type="password" name="password"><br><br>
                <input style='padding: 12px; border-radius: 10px' type="submit" name="submit" value="Login">
            </form>
        </div>
    </body>
</html>
